steps:

  - name: Checkout repo
    uses: actions/checkout@v4
    with:
      persist-credentials: true

  - name: Setup git
    run: |
      git config --global user.name 'github-actions[bot]'
      git config --global user.email '41898282+github-actions[bot]@users.noreply.github.com'

  - name: Install mihomo
    run: |
      wget -q https://github.com/MetaCubeX/mihomo/releases/latest/download/mihomo-linux-amd64-compatible -O mihomo
      chmod +x mihomo
      sudo mv mihomo /usr/local/bin/mihomo
      mihomo -v


  - name: Download source IP lists
    run: |
      mkdir -p source

      curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/cmcc.txt \
        -o source/cmcc4.txt

      curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/cmcc6.txt \
        -o source/cmcc6.txt

      curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/unicom.txt \
        -o source/cucc4.txt

      curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/unicom6.txt \
        -o source/cucc6.txt

      curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/chinanet.txt \
        -o source/ctcc4.txt

      curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/chinanet6.txt \
        -o source/ctcc6.txt

      curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/cernet.txt \
        -o source/cernet4.txt

      curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/cernet6.txt \
        -o source/cernet6.txt


  - name: Clean source files
    run: |
      for file in source/*.txt
      do
        sed -i 's/\r//g' "$file"

        sed -i \
        '/^[[:space:]]*$/d;
         /^[[:space:]]*#/d;
         s/[[:space:]]//g' "$file"
      done


  - name: Generate YAML LIST MRS
    run: |

      mkdir -p rule_script/Mihomo/China-Operator_IP
      mkdir -p rule_script/Clash/China-Operator_IP
      mkdir -p rule_script/Surge/China-Operator_IP


      make_yaml() {

        input=$1
        output=$2

        echo "# generated by github actions" > "$output"
        echo "payload:" >> "$output"

        while read ip
        do
          echo "  - $ip" >> "$output"
        done < "$input"

      }


      make_list() {

        input=$1
        output=$2
        type=$3

        echo "# generated by github actions" > "$output"

        while read ip
        do
          echo "${type},${ip},no-resolve" >> "$output"
        done < "$input"

      }


      make_mrs() {

        input=$1
        output=$2

        cat > temp.yaml <<EOF
```

payload:

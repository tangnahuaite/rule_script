name: "Generate mihomo IP and Domain rules MRS"

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:


jobs:
  build:

    runs-on: ubuntu-latest


    steps:

      - name: Checkout repo
        uses: actions/checkout@v5
        with:
          persist-credentials: true


      - name: Setup git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"



      - name: Install mihomo
        run: |

          VERSION=$(curl -s https://api.github.com/repos/MetaCubeX/mihomo/releases/latest | grep '"tag_name"' | cut -d '"' -f 4)

          echo "mihomo version: ${VERSION}"


          wget -q \
          https://github.com/MetaCubeX/mihomo/releases/download/${VERSION}/mihomo-linux-amd64-compatible-${VERSION}.gz \
          -O mihomo.gz


          gunzip mihomo.gz

          chmod +x mihomo

          sudo mv mihomo /usr/local/bin/mihomo


          mihomo -v



      - name: Download source rules
        run: |

          mkdir -p source


          # China Mobile

          curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/cmcc.txt \
          -o source/cmcc4.txt

          curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/cmcc6.txt \
          -o source/cmcc6.txt



          # China Unicom

          curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/unicom.txt \
          -o source/cucc4.txt

          curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/unicom6.txt \
          -o source/cucc6.txt



          # China Telecom

          curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/chinanet.txt \
          -o source/ctcc4.txt

          curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/chinanet6.txt \
          -o source/ctcc6.txt



          # CERNET

          curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/cernet.txt \
          -o source/cernet4.txt

          curl -sL https://raw.githubusercontent.com/gaoyifan/china-operator-ip/refs/heads/ip-lists/cernet6.txt \
          -o source/cernet6.txt



          # ChinaMax Domain

          curl -sL https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/ChinaMax/ChinaMax_Domain.yaml \
          -o source/ChinaMax_Domain.yaml



          # ChinaMax IP

          curl -sL https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/refs/heads/master/rule/Clash/ChinaMax/ChinaMax_IP.yaml \
          -o source/ChinaMax_IP.yaml



      - name: Clean source files
        run: |

          for file in source/*.txt
          do

            sed -i 's/\r//g' "$file"

            sed -i \
            '/^[[:space:]]*$/d;
             /^[[:space:]]*#/d;
             s/[[:space:]]//g' "$file"

          done




      - name: Generate YAML LIST MRS
        shell: bash
        run: |


          mkdir -p rule_script/Mihomo/China-Operator_IP
          mkdir -p rule_script/Mihomo/China_IP
          mkdir -p rule_script/Mihomo/China_Domain


          mkdir -p rule_script/Clash/China-Operator_IP
          mkdir -p rule_script/Surge/China-Operator_IP




          make_yaml()
          {

            input="$1"
            output="$2"


            echo "# generated by github actions" > "$output"
            echo "payload:" >> "$output"


            while read -r ip
            do

              echo "  - $ip" >> "$output"

            done < "$input"

          }





          make_list()
          {

            input="$1"
            output="$2"
            type="$3"


            echo "# generated by github actions" > "$output"


            while read -r ip
            do

              echo "${type},${ip},no-resolve" >> "$output"

            done < "$input"

          }





          make_ip_mrs()
          {

            input="$1"
            output="$2"


            echo "payload:" > temp.yaml


            while read -r ip
            do

              echo "  - $ip" >> temp.yaml

            done < "$input"



            mihomo convert-ruleset ipcidr yaml temp.yaml "$output"


            rm -f temp.yaml

          }





          make_domain_mrs()
          {

            input="$1"
            output="$2"


            mihomo convert-ruleset domain yaml "$input" "$output"

          }





          make_ip_yaml_mrs()
          {

            input="$1"
            output="$2"


            mihomo convert-ruleset ipcidr yaml "$input" "$output"

          }






          # Operator IP

          for file in source/*.txt

          do

            name=$(basename "$file" .txt)


            echo "Generate ${name}"



            make_yaml \
            "$file" \
            "rule_script/Clash/China-Operator_IP/${name}.yaml"




            if [[ "$name" == *6* ]]
            then

              make_list \
              "$file" \
              "rule_script/Surge/China-Operator_IP/${name}.list" \
              "IP-CIDR6"

            else

              make_list \
              "$file" \
              "rule_script/Surge/China-Operator_IP/${name}.list" \
              "IP-CIDR"

            fi



            make_ip_mrs \
            "$file" \
            "rule_script/Mihomo/China-Operator_IP/${name}.mrs"


          done






          # ChinaMax Domain

          echo "Generate ChinaMax_Domain.mrs"


          make_domain_mrs \
          source/ChinaMax_Domain.yaml \
          rule_script/Mihomo/China_Domain/ChinaMax_Domain.mrs






          # ChinaMax IP

          echo "Generate ChinaMax_IP.mrs"


          make_ip_yaml_mrs \
          source/ChinaMax_IP.yaml \
          rule_script/Mihomo/China_IP/ChinaMax_IP.mrs






      - name: Commit changes
        run: |

          if [[ -n "$(git status --porcelain)" ]]

          then

            git add .


            git commit \
            -m "Update mihomo IP and domain rules $(date -u +'%Y-%m-%d')" \
            || true


            git push


          else

            echo "No changes."

          fi
